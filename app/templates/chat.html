{% extends "base.html" %}
{% block body %}
<aside class="sb">
  <div class="logo"><div class="logo-m">MARK4K</div><div class="logo-s">User: {{ current_user.username }}</div></div>
  <nav class="nav">
    <div class="ni on" onclick="setMode('chat',this)">💬 Chat Advisor</div>
    <div class="ni" onclick="setMode('pdf',this)">📄 PDF Analyzer</div>
    <a href="{{ url_for('main.logout') }}" class="ni" style="text-decoration:none; margin-top:20px;">🚪 Logout</a>
  </nav>
</aside>
<div class="main">
  <div class="topbar"><span class="ttl" id="ttl">Project Advisor</span></div>
  <div class="chat" id="chat"><div class="wl" id="wl"><h2>Hello {{ current_user.username }}</h2><p>How can I help with your studies today?</p></div></div>
  <div class="ia"><div class="ir"><div class="iw"><textarea id="inp" rows="1" placeholder="Type here..." onkeydown="handleKey(event)" oninput="grow(this)"></textarea></div><button class="sb-btn" id="sendBtn" onclick="send()">➤</button></div></div>
</div>
<div class="ov" id="pdfOv" onclick="closeOv('pdfOv')"><div class="modal" onclick="event.stopPropagation()"><h3>Analyze PDF</h3><input type="file" id="pdfIn" accept=".pdf" onchange="onPDF(this)"><button class="btn bgo" onclick="submitPDF()">Upload</button></div></div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
{% endblock %}
