{% extends "base.html" %}
{% block body %}
<div class="auth-container">
    <div class="modal">
        <h2 style="color:var(--gold); text-align:center;">MARK4K LOGIN</h2>
        {% with messages = get_flashed_messages() %}{% if messages %}<div class="toast err">{{ messages[0] }}</div>{% endif %}{% endwith %}
        <form method="POST">
            <div class="fld"><label>Username</label><input type="text" name="username" required></div>
            <div class="fld"><label>Password</label><input type="password" name="password" required></div>
            <button type="submit" class="btn bgo" style="width:100%">Login</button>
        </form>
        <p style="text-align:center; margin-top:15px; font-size:12px;">No account? <a href="{{ url_for('main.register') }}" style="color:var(--gold)">Register</a></p>
    </div>
</div>
{% endblock %}
